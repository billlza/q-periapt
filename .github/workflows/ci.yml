name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Format + lint + unit tests on the host.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets
      - run: cargo test --workspace

  # no_std build of the auditable core for an embedded target (must not pull std).
  no_std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - run: cargo build -p q-periapt-core --target thumbv7em-none-eabihf

  # Cross-platform behavioural consistency: build the same code everywhere.
  cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu      # ARM64
          - riscv64gc-unknown-linux-gnu    # RISC-V
          - wasm32-unknown-unknown         # WASM
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build -p q-periapt-core -p q-periapt-kem --target ${{ matrix.target }}

  # Cross-compiler differential: the constant-time / behaviour must not depend on
  # the compiler. (Placeholder: extend with gcc/clang FFI builds + differential KATs.)
  cross-compiler:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, beta, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - run: cargo test --workspace

  # Side-channel gates: failure-path indistinguishability (hard gate) + dudect
  # timing report (informational). See ctstats/README.md for the honest scope.
  sidechannel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Failure-path indistinguishability (hard gate)
        run: cargo test -p q-periapt-ctstats
      - name: dudect timing report (informational, never fails)
        run: cargo run --release -p q-periapt-ctstats --bin dudect_decaps || true

  # Dataflow constant-time HARD GATE (Valgrind/Memcheck TIMECOP). Secrets are marked
  # "undefined"; Memcheck flags any branch/index that depends on them, so a non-CT
  # path makes Valgrind exit non-zero. Verifies the suite's own CT composition code
  # (ct_eq / ct_select32 / the combiner over secret shared secrets).
  constant-time:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Valgrind (provides valgrind/memcheck.h for the shim)
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Build the ct_verify harness (real Memcheck client requests)
        run: cargo build --release -p q-periapt-ctstats --bin ct_verify --features valgrind
      - name: Memcheck — no secret-dependent control flow (hard gate)
        run: valgrind --error-exitcode=1 --leak-check=no --track-origins=yes ./target/release/ct_verify

  # Transport: real loopback PQ/T hybrid handshake + P99 harness (report).
  transport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Loopback handshake (both profiles)
        run: cargo test -p q-periapt-tls-demo
      - name: P99 harness (informational)
        run: cargo run --release -p q-periapt-tls-demo --bin p99_bench -- bound 2000 || true

  # Cross-platform bindings: each binding decapsulates the shared reference vector
  # (bindings/shared-test-vectors.json) and must reproduce the secret byte-for-byte.
  # The Rust core + C ABI path is checked in `check` (ffi_matches_shared_vector).

  bindings-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cargo install wasm-pack
      # Runs the shared-vector consistency test on a real wasm runtime (Node).
      - run: wasm-pack test --node crates/q-periapt-wasm

  # Robustness fuzzing (nightly + libFuzzer). The fuzz crate is detached from the
  # workspace; this compiles every target. (Time-boxed runs are done locally.)
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz
      - run: cargo +nightly fuzz build --fuzz-dir fuzz

  bindings-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p q-periapt-ffi --release
      - run: cp crates/q-periapt-ffi/include/q_periapt.h bindings/swift/Sources/CQPeriapt/q_periapt.h
      - run: swift test --package-path bindings/swift -Xlinker -L${{ github.workspace }}/target/release

  bindings-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22" # java.lang.foreign (FFM) is stable in JDK 22+
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.2.1"
      - run: cargo build -p q-periapt-ffi --release
      - run: gradle test --project-dir bindings/kotlin

  # Auditability artifacts: emit the CycloneDX CBOM + SBOM (and prove the CLI runs).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo run -p q-periapt-cli --bin qperiapt -- cbom --out cbom.cdx.json
      - run: cargo run -p q-periapt-cli --bin qperiapt -- sbom --lock Cargo.lock --out sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-boms
          path: "*.cdx.json"

  # Optional PQ backends (SLH-DSA via fips205, HQC via PQClean C): the ONLY job
  # that compiles them. Default/wasm/no_std jobs above prove they stay unpulled.
  pq-optional-backends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -p q-periapt-backends --features slh-dsa,hqc --all-targets -- -D warnings
      - run: cargo test -p q-periapt-backends --features slh-dsa,hqc
      - run: cargo install cargo-audit
      # RUSTSEC-2026-0163 (pqcrypto-internals unmaintained) is acknowledged in
      # .cargo/audit.toml — surfaced, not hidden.
      - run: cargo audit

  # Fence: the C-based hqc feature must NEVER build on wasm32 (compile_error guard).
  feature-fence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,thumbv7em-none-eabihf
      - run: cargo build -p q-periapt-wasm --target wasm32-unknown-unknown
      - run: cargo build -p q-periapt-core --target thumbv7em-none-eabihf
      - name: hqc feature must fail to build on wasm32 (fence holds)
        run: "! cargo build -p q-periapt-backends --features hqc --target wasm32-unknown-unknown 2>/dev/null"

  # Formal proofs. The no-admits check is a reliable HARD GATE (catches a proof
  # being stubbed out); the full EasyCrypt machine-check runs when the toolchain
  # installs (best-effort — a hermetic EasyCrypt install is heavy). The binding
  # theorem reduces only to be8 fixed-width/injectivity + CR(H); see formal/.
  formal-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No admits/sorry in the mechanized proofs (hard gate)
        run: "! grep -rnE 'admit|sorry' formal/easycrypt/"
      - name: Install Z3 + EasyCrypt (best-effort)
        id: ec
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y opam z3 libgmp-dev libpcre2-dev
          opam init -y --disable-sandboxing --compiler=5.4.1
          opam install -y easycrypt
          opam exec -- easycrypt why3config
      - name: Machine-check the binding proof (make check)
        if: steps.ec.outcome == 'success'
        run: opam exec -- make -C formal/easycrypt check

  # Still TODO as harnesses land (see ctstats/README.md, fuzz/, tests/):
  #   - extend the `constant-time` Memcheck/TIMECOP gate over the libcrux primitive
  #     paths and to non-x86 targets (it covers our composition code today)
  #   - cargo-fuzz targets (fuzz/)
  #   - X-Wing KAT lives in q-periapt-backends; ACVP breadth + ContextBound vectors pending
