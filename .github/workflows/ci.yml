name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Retry transient crates.io download failures; the default is 3.
  CARGO_NET_RETRY: "10"
  # Force HTTP/1.1 for registry downloads: cargo's curl hits intermittent "[16] Error in the HTTP2
  # framing layer" on the runners, which CARGO_NET_RETRY does NOT cover. Disabling multiplexing is
  # the documented workaround and makes crate fetches deterministic.
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  # Format + lint + unit tests on the host.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: sudo apt-get update && sudo apt-get install -y cmake pkg-config
      - run: cargo install cbindgen --locked
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      # Discover every artifact/test_*.py module so newly added fail-closed
      # verifiers cannot silently remain local-only because an explicit list drifted.
      - run: sh artifact/python-run.sh -m unittest discover -s artifact -p 'test_*.py' -v
      - name: Proof-to-byte manifest and canonical source binding
        run: QPERIAPT_SKIP_SMOKE=1 sh artifact/proof-to-byte.sh
      - name: Paired performance harness schema (shared-runner, no numeric claim)
        run: |
          cargo run --release --locked -p q-periapt-backends --example paired_profile_perf -- \
            --samples 200 --warmup-ms 100 --raw-out target/performance/ci-paired-profile.jsonl
          sh artifact/python-run.sh artifact/performance_gate.py validate-raw \
            --raw target/performance/ci-paired-profile.jsonl
      # C-ABI link smoke test on Linux (gcc/clang links a C consumer against the cdylib).
      - run: sh bindings/c/build-and-run.sh
      # C-ABI distribution smoke: archive, extract, pkg-config consumer, and CMake consumer.
      - run: sh artifact/c-package.sh

  # Crates.io pre-publication contract. This is not an upload step: it checks the
  # explicit publish allow/deny list, package file lists, patched
  # `cargo publish --dry-run` for every publishable crate, and an isolated scan
  # of Cargo's normalized backend package from a clean checkout.
  rust-publish-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sh artifact/rust-publish-dry-run.sh

  # Windows MSVC face. The suite claims byte-identical output across OSes, not just ISAs,
  # so exercise the full test suite on x86_64-pc-windows-msvc, including the C `ct_shim`
  # (compiled via cc/cl.exe) and the optional pure-Rust SLH-DSA backend.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --locked
      - run: cargo test -p q-periapt-backends --features slh-dsa --locked
      # ABI2 C link smoke: cl.exe links a C consumer against q_periapt_ffi_abi2.dll.
      - run: bindings\c\build-and-run.bat

  # no_std build of the auditable core for an embedded target (must not pull std).
  no_std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - run: cargo build -p q-periapt-core --target thumbv7em-none-eabihf

  # Cross-platform behavioural consistency: build the same code everywhere.
  cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu      # ARM64
          - riscv64gc-unknown-linux-gnu    # RISC-V
          - wasm32-unknown-unknown         # WASM
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build -p q-periapt-core -p q-periapt-kem --target ${{ matrix.target }}

  # riscv64 byte-identity, EXECUTED under qemu-user (not just cross-compiled): the pinned
  # ContextBound / enhanced-suite reference-vector KATs must reproduce byte-for-byte on the
  # emulated riscv64 binary. This upgrades riscv64 from "by construction" to "run" in the
  # cross-substrate claim. Verified on bare-metal x86-64 (qemu 8.2): both KATs pass.
  riscv64-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64gc-unknown-linux-gnu
      - run: sudo apt-get update && sudo apt-get install -y qemu-user-static gcc-riscv64-linux-gnu
      - name: Run the byte-identity KATs on riscv64 under qemu-user
        env:
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_RUNNER: qemu-riscv64-static -L /usr/riscv64-linux-gnu
        run: cargo test --release --locked --target riscv64gc-unknown-linux-gnu -p q-periapt-backends reference_vector

  # Cross-compiler differential: the constant-time / behaviour must not depend on
  # the compiler. (Placeholder: extend with gcc/clang FFI builds + differential KATs.)
  cross-compiler:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, beta, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      # `+${{ matrix.toolchain }}` is REQUIRED: the root rust-toolchain.toml pins stable and
      # would otherwise shadow the action's default, silently running beta/nightly on stable.
      - run: cargo +${{ matrix.toolchain }} test --workspace --locked

  # Enforce the declared MSRV against the committed lock. `+1.85` selects it explicitly so the
  # root rust-toolchain.toml (stable) can't shadow it.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - run: cargo +1.85 build --workspace --locked

  # Side-channel gate: failure-path indistinguishability. Empirical dudect timing
  # is intentionally not run on noisy shared CI; use the documented local command
  # on quiesced hardware and treat its exit status as meaningful.
  sidechannel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Failure-path indistinguishability (hard gate)
        run: cargo test -p q-periapt-ctstats --locked
  # Dataflow constant-time HARD GATE (Valgrind/Memcheck TIMECOP). Secrets are marked
  # "undefined"; Memcheck flags any branch/index that depends on them, so a non-CT
  # path makes Valgrind exit non-zero. Verifies the suite's own CT composition code
  # (ct_eq / ct_select32 / the combiner over secret shared secrets).
  constant-time:
    # Dataflow CT gate on BOTH architectures: Memcheck/TIMECOP marks secrets undefined and
    # flags any secret-dependent branch/index in our composition code. x86_64 + aarch64 —
    # the emitted assembly differs per target, so each is an independent check. (Verified
    # locally in an aarch64 Linux container too; a planted secret-branch negative control
    # confirms Memcheck catches leaks there.)
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Valgrind (provides valgrind/memcheck.h for the shim)
        run: sudo apt-get update && sudo apt-get install -y valgrind
      - name: Build the ct_verify harness (real Memcheck client requests)
        run: cargo build --release -p q-periapt-ctstats --bin ct_verify --features valgrind
      - name: Memcheck — no secret-dependent control flow (hard gate)
        run: valgrind --error-exitcode=1 --leak-check=no --track-origins=yes ./target/release/ct_verify
      - name: Build the source→binary CT gap probe (real libcrux ML-KEM decapsulate)
        run: cargo build --release -p q-periapt-ctstats --bin ct_decaps_gap --features valgrind
      - name: Memcheck — source→binary CT gap probe (self-validating)
        run: |
          BIN=./target/release/ct_decaps_gap
          # Negative control: a planted secret-indexed load MUST be caught, else the gate is vacuous.
          if valgrind --error-exitcode=1 --leak-check=no -q "$BIN" control >/dev/null 2>&1; then
            echo "::error::negative control not caught — Memcheck gate is vacuous on ${{ matrix.runner }}"; exit 1
          fi
          # Positive control: marking the embedded PUBLIC key (which drives the q-branches) MUST flag.
          if valgrind --error-exitcode=1 --leak-check=no -q "$BIN" ek >/dev/null 2>&1; then
            echo "::error::ek positive control did not flag — Memcheck not seeing real libcrux branches"; exit 1
          fi
          # HARD GATE: marking the GENUINE secret (ŝ+z) must yield ZERO secret-dependent branches,
          # i.e. libcrux's source-level secret-independence survives compilation on this ISA.
          valgrind --error-exitcode=1 --leak-check=no --track-origins=yes "$BIN" probe
          echo "source→binary CT gap probe: no gap on ${{ matrix.runner }}"

  # Transport: real loopback PQ/T hybrid handshake + P99 harness (report).
  transport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Loopback handshake (both profiles)
        run: cargo test -p q-periapt-tls-demo --locked
      - name: P99 harness (informational)
        run: cargo run --release -p q-periapt-tls-demo --bin p99_bench -- bound 2000

  # Cross-platform bindings: each binding decapsulates the shared reference vector
  # (bindings/shared-test-vectors.json) and must reproduce the secret byte-for-byte.
  # The Rust core + C ABI path is checked in `check` (ffi_matches_shared_vector).

  bindings-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cargo install wasm-pack
      # Runs the shared-vector consistency test on a real wasm runtime (Node).
      - run: wasm-pack test --node crates/q-periapt-wasm

  # Robustness fuzzing (nightly + libFuzzer). The fuzz crate is detached from the
  # workspace; this compiles every target. (Time-boxed runs are done locally.)
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo install cargo-fuzz
      - run: cargo +nightly fuzz build --fuzz-dir fuzz

  bindings-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # The release gate inspects Rust-produced archives with the matching
          # Rust LLVM version; Xcode llvm-nm may reject newer Rust bitcode.
          components: llvm-tools
      - run: rustup target add aarch64-apple-darwin x86_64-apple-darwin aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
      - run: cargo build -p q-periapt-ffi --release
      - run: cargo install cbindgen --locked
      - name: Generated C/Swift header freshness
        run: |
          mkdir -p target
          cbindgen --config crates/q-periapt-ffi/cbindgen.toml \
            --crate q-periapt-ffi \
            --output target/qperiapt-ci-header.h
          cmp target/qperiapt-ci-header.h crates/q-periapt-ffi/include/q_periapt.h
          cmp crates/q-periapt-ffi/include/q_periapt.h bindings/swift/Sources/CQPeriapt/q_periapt.h
      - run: swift test --package-path bindings/swift -Xlinker -L${{ github.workspace }}/target/release
      - run: sh artifact/swift-xcframework.sh

  bindings-kotlin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22" # java.lang.foreign (FFM) is stable in JDK 22+
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.2.1"
      - run: cargo build -p q-periapt-ffi --release
      - run: gradle test --project-dir bindings/kotlin

  bindings-android-aar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android,armv7-linux-androideabi,i686-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
      - uses: android-actions/setup-android@v3
      - run: cargo install cbindgen --locked
      - name: Install pinned Android SDK/NDK inputs
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"
      - name: Android AAR/JNI packaging proof
        run: |
          QPERIAPT_ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.0.12077973" \
          QPERIAPT_ANDROID_PLATFORM="$ANDROID_HOME/platforms/android-35" \
          QPERIAPT_ANDROID_BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0" \
          sh artifact/android-aar.sh

  # Auditability artifacts: emit the CycloneDX CBOM + SBOM (and prove the CLI runs).
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo run -p q-periapt-cli --bin qperiapt -- cbom --out cbom.cdx.json
      - run: cargo run -p q-periapt-cli --bin qperiapt -- sbom --lock Cargo.lock --out sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-boms
          path: "*.cdx.json"
      - run: cargo install cargo-audit --version 0.22.2 --locked
      # Unconditional release gate over the complete root lockfile. No advisory
      # is ignored; an upstream-only warning intentionally keeps ABI 2 blocked.
      - run: cargo audit --deny warnings

  # Optional SLH-DSA backend (FIPS 205 via fips205).
  pq-optional-backends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -p q-periapt-backends --features slh-dsa --all-targets --locked -- -D warnings
      - run: cargo test -p q-periapt-backends --features slh-dsa --locked

  # Isolated HQC v5 / FIPS 207 draft-candidate research lane. It has its own
  # workspace and lockfile and is never a dependency of a publishable crate.
  hqc-draft-candidate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown,thumbv7em-none-eabihf,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: bash research/hqc-fips207-candidate/scripts/verify.sh

  # Cross-target feature fence for the shipping WASM face and dependency-free core.
  feature-fence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,thumbv7em-none-eabihf
      - run: cargo build -p q-periapt-wasm --target wasm32-unknown-unknown
      - run: cargo build -p q-periapt-core --target thumbv7em-none-eabihf

  # Formal proofs. The no-admits check is a reliable HARD GATE (catches a proof
  # being stubbed out). The full EasyCrypt machine-check runs in the hermetic
  # hard-gate job below. The binding theorem reduces only to be8 fixed-width /
  # injectivity + CR(H); see formal/.
  formal-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No admits/sorry in the mechanized proofs (hard gate)
        run: "! grep -rnEw 'admit|sorry' --include='*.ec' formal/easycrypt/"
      # The FULL proof re-check (BindingViaCR.ec + seven proof-dependency regression controls
      # + the non-normative Lifecycle/Prekey canonical-projection diagnostics) runs as a HARD
      # GATE in `formal-hermetic` below. Hint-deletion failures establish only dependencies of
      # the current scripts; semantic necessity comes from explicit countermodels.

  # Hermetic EasyCrypt proof check (HARD GATE). Builds the EasyCrypt r2026.06 toolchain image
  # (formal/Dockerfile, layer-cached) and re-runs the binding proof, proof-dependency controls,
  # and both Continuity canonical-projection diagnostics.
  # `BindingViaCR.ec` also contains the explicit probability-one K!=bottom countermodel; do not
  # infer logical necessity merely from an edited tactic failing.
  formal-hermetic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build the pinned EasyCrypt image (layer-cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: formal/Dockerfile
          tags: q-periapt-ec:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Machine-check proof, countermodels, and dependency controls (HARD GATE)
        run: |
          # Mount the proofs read-only and copy into a container-owned dir: the checkout's committed
          # .eco is host-owned, so the container's opam user can't rm it in place. Copying makes the
          # files opam-owned, so `rm -f *.eco` forces a from-scratch re-check.
          docker run --rm -v "${{ github.workspace }}/formal/easycrypt:/src:ro" q-periapt-ec:ci \
            opam exec -- sh -c 'mkdir -p /tmp/ec && cp -r /src/. /tmp/ec && cd /tmp/ec && rm -f *.eco continuity/*.eco && easycrypt BindingViaCR.ec && sh negative-controls.sh && EC=easycrypt make -C continuity check'

  # Symbolic handshake proof. The lemma-presence check catches a lemma being
  # deleted/stubbed out; the full Tamarin machine-check is a HARD GATE too.
  # Proves authentication + hybrid secrecy of the PQ/T handshake in the symbolic
  # (Dolev–Yao) model; see formal/tamarin.
  tamarin-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: All five Tamarin lemmas present (hard gate)
        run: |
          for l in executable server_authentication authenticated_context_agreement hybrid_secrecy hybrid_robustness_authenticated; do
            grep -qE "^lemma ${l}:" formal/tamarin/handshake.spthy || { echo "missing lemma: ${l}"; exit 1; }
          done
      - name: Install Maude + Tamarin
        run: |
          sudo apt-get update
          sudo apt-get install -y maude graphviz
          curl -fsSL https://github.com/tamarin-prover/tamarin-prover/releases/download/1.10.0/tamarin-prover-1.10.0-linux64-ubuntu.tar.gz \
            | sudo tar -xz -C /usr/local/bin tamarin-prover
          tamarin-prover --version
      - name: Machine-check the handshake model (make prove)
        run: make -C formal/tamarin prove

  # Second, independent symbolic prover (ProVerif) for the same handshake — assurance
  # diversity. The security events + queries are presence-gated, and the ProVerif
  # machine-check is also a HARD GATE: `make prove` asserts the RESULT lines. See
  # formal/proverif.
  proverif-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Handshake events + six queries present (hard gate)
        run: |
          for e in ServerDone ClientFinish RevealSig RevealPQ RevealTrad; do
            grep -qE "^event ${e}\(" formal/proverif/handshake.pv || { echo "missing event: ${e}"; exit 1; }
          done
          n=$(grep -cE '^query ' formal/proverif/handshake.pv)
          test "$n" -eq 6 || { echo "expected exactly 6 queries, found $n"; exit 1; }
      - name: Install ProVerif
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk2.0-dev opam pkg-config
          opam init -y --disable-sandboxing
          opam install -y proverif
      - name: Machine-check the handshake model (queries must hold)
        run: opam exec -- make -C formal/proverif prove

  # Still TODO as harnesses land (see ctstats/README.md):
  #   - extend the `constant-time` Memcheck/TIMECOP gate to the remaining primitive/backend
  #     paths and to riscv64/wasm32; ML-KEM decapsulation is already gated on x86_64+aarch64
  #   - promote the local dudect timing diagnostic to a gate on quiesced hardware
  # Done since this note was written: full NIST ACVP (ML-KEM-512/768/1024 +
  # ML-DSA-44/65/87 + SLH-DSA) and ContextBound reference vectors in q-periapt-backends;
  # cargo-fuzz targets under fuzz/ (combine + ML-KEM decapsulate) with a seed corpus.
